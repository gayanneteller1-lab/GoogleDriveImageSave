<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Chart Saver</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h3 { text-align: center; color: #1a73e8; margin-top: 0; }
        .input-group { margin-bottom: 12px; }
        label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #1a73e8; outline: none; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        #status { margin-top: 15px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h3>Trade Snapshots Saver</h3>
    
    <div class="input-group">
        <label>Folder Name (Trade Pair or Date):</label>
        <input type="text" id="folderName" placeholder="උදා: BTCUSD Buy Setup">
    </div>
    
    <hr style="border: 0.5px solid #eee; margin: 20px 0;">

    <div class="input-group">
        <label>1. Kingdom Time Frame (Zoom Out):</label>
        <input type="text" class="img-link" placeholder="Paste link here">
    </div>
    <div class="input-group">
        <label>2. Kingdom Time Frame (Zoom In):</label>
        <input type="text" class="img-link" placeholder="Paste link here">
    </div>
    <div class="input-group">
        <label>3. Reading Time Frame (Zoom Out):</label>
        <input type="text" class="img-link" placeholder="Paste link here">
    </div>
    <div class="input-group">
        <label>4. Reading Time Frame (Zoom In):</label>
        <input type="text" class="img-link" placeholder="Paste link here">
    </div>
    <div class="input-group">
        <label>5. After TP or SL:</label>
        <input type="text" class="img-link" placeholder="Paste link here">
    </div>
    
    <button onclick="saveToDrive()" id="saveBtn">Save All Charts</button>
    <div id="status"></div>
</div>

<script>
    async function saveToDrive() {
        const folderName = document.getElementById('folderName').value;
        const linkInputs = document.querySelectorAll('.img-link');
        const status = document.getElementById('status');
        const btn = document.getElementById('saveBtn');

        const imageUrls = Array.from(linkInputs).map(input => input.value.trim());

        if (!folderName || imageUrls.every(url => url === "")) {
            alert("කරුණාකර Folder නම සහ අවම වශයෙන් එක් Chart Link එකක්වත් දාන්න.");
            return;
        }

        status.innerText = "Charts ටික Drive එකට යනවා... පොඩ්ඩක් ඉන්න.";
        status.style.color = "#1a73e8";
        btn.disabled = true;

        // --- ඔබේ අලුත් WEB APP URL එක මෙතනට දාන්න ---
        const WEB_APP_URL = 'ඔබේ_අලුත්_WEB_APP_URL_එක_මෙතනට_දමන්න';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folderName, imageUrls })
            });

            status.innerText = "සියල්ල සාර්ථකව Save වුනා!";
            status.style.color = "green";
        } catch (error) {
            status.innerText = "Error එකක් ආවා. ආයෙත් Try කරන්න.";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
