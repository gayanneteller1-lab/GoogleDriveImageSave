<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Multi-Image Saver</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #eef2f7; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h3 { text-align: center; color: #333; margin-bottom: 20px; }
        label { font-size: 14px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin: 8px 0 18px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #28a745; outline: none; box-shadow: 0 0 5px rgba(40,167,69,0.2); }
        button { width: 100%; padding: 14px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; text-align: center; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h3>Drive Image Saver</h3>
    
    <label>Folder Name:</label>
    <input type="text" id="folderName" placeholder="Folder නම මෙතන ගහන්න">
    
    <label>Image Links (TradingView):</label>
    <input type="text" class="img-link" placeholder="Image Link 01">
    <input type="text" class="img-link" placeholder="Image Link 02">
    <input type="text" class="img-link" placeholder="Image Link 03">
    <input type="text" class="img-link" placeholder="Image Link 04">
    <input type="text" class="img-link" placeholder="Image Link 05">
    
    <button onclick="saveToDrive()" id="saveBtn">Save All to Drive</button>
    <div id="status"></div>
</div>

<script>
    async function saveToDrive() {
        const folderName = document.getElementById('folderName').value;
        const linkInputs = document.querySelectorAll('.img-link');
        const status = document.getElementById('status');
        const btn = document.getElementById('saveBtn');

        // Link ටික list එකකට (Array) දාගන්නවා
        const imageUrls = [];
        linkInputs.forEach(input => {
            if (input.value.trim() !== "") {
                imageUrls.push(input.value.trim());
            }
        });

        if (!folderName || imageUrls.length === 0) {
            alert("කරුණාකර Folder නම සහ අවම වශයෙන් එක් Link එකක්වත් ඇතුළත් කරන්න!");
            return;
        }

        status.innerText = "Saving " + imageUrls.length + " images... රැඳී සිටින්න.";
        status.style.color = "blue";
        btn.disabled = true;

        // --- ඔබේ අලුත් WEB APP URL එක මෙතනට දාන්න ---
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyhIuUe60Kgl3rFU2qhRjc5VHUbnP9eu2n9cqjhaYe-OVeuH-NxaPhIqlURTh1qYK9sKw/exec';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folderName, imageUrls })
            });

            status.innerText = "සාර්ථකයි! Google Drive එක පරීක්ෂා කරන්න.";
            status.style.color = "green";
            
            // සාර්ථක වුනාට පස්සේ input boxes හිස් කරන්න (අවශ්‍ය නම්)
            // linkInputs.forEach(input => input.value = "");
            
        } catch (error) {
            status.innerText = "වැරදීමක් වුනා! නැවත උත්සාහ කරන්න.";
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
