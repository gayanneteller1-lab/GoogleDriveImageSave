<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Chart Saver - Jay</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #28a745;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 480px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .chart-box {
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #f0f0f0;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #1557b0;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Chart Snapshots Saver</h2>
    
    <div class="input-group">
        <label>Folder Name (Trade Pair / Date):</label>
        <input type="text" id="folderName" placeholder="උදා: EURUSD Buy Setup">
    </div>

    <div class="chart-box">
        <div class="input-group">
            <label>1. Kingdom Time Frame (Zoom Out)</label>
            <input type="text" class="img-link" placeholder="Paste TradingView link">
        </div>
        <div class="input-group">
            <label>2. Kingdom Time Frame (Zoom In)</label>
            <input type="text" class="img-link" placeholder="Paste TradingView link">
        </div>
        <div class="input-group">
            <label>3. Reading Time Frame (Zoom Out)</label>
            <input type="text" class="img-link" placeholder="Paste TradingView link">
        </div>
        <div class="input-group">
            <label>4. Reading Time Frame (Zoom In)</label>
            <input type="text" class="img-link" placeholder="Paste TradingView link">
        </div>
        <div class="input-group">
            <label>5. After TP or SL</label>
            <input type="text" class="img-link" placeholder="Paste TradingView link">
        </div>
    </div>

    <button onclick="saveToDrive()" id="saveBtn">Save All to Google Drive</button>
    <div id="status"></div>
</div>

<script>
    async function saveToDrive() {
        const folderName = document.getElementById('folderName').value;
        const linkInputs = document.querySelectorAll('.img-link');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('saveBtn');

        // Link ටික Array එකකට ගන්නවා
        const imageUrls = Array.from(linkInputs).map(input => input.value.trim());

        // පරීක්ෂා කිරීම්
        if (!folderName) {
            alert("කරුණාකර Folder නමක් ඇතුළත් කරන්න.");
            return;
        }

        if (imageUrls.every(url => url === "")) {
            alert("අඩුම තරමේ එක link එකක්වත් ඇතුළත් කරන්න.");
            return;
        }

        // Status එක පෙන්වීම
        statusDiv.style.display = "block";
        statusDiv.innerText = "සකසමින් පවතී... කරුණාකර රැඳී සිටින්න.";
        statusDiv.style.color = "#1a73e8";
        statusDiv.style.backgroundColor = "#e8f0fe";
        btn.disabled = true;

        // --- ඔබේ Google Apps Script Web App URL එක පහතින් දාන්න ---
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzHPzkdHOGTXh23l1exciFb5ymUuYdTfG3BM9Vo0X0lwkEjQsXI76U5_dK8xG1r_yt6yw/exec';

        try {
            // Google Script එකට data යැවීම
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folderName, imageUrls })
            });

            // සාර්ථක පණිවිඩය
            statusDiv.innerText = "ඉල්ලීම යැවුවා! විනාඩියකින් ඔබේ Google Drive එක පරීක්ෂා කරන්න.";
            statusDiv.style.color = "#155724";
            statusDiv.style.backgroundColor = "#d4edda";
            
            // Boxes හිස් කිරීමට අවශ්‍ය නම් පහත පේළි පාවිච්චි කරන්න
            // document.getElementById('folderName').value = "";
            // linkInputs.forEach(input => input.value = "");

        } catch (error) {
            statusDiv.innerText = "වැරදීමක් සිදු වුනා. නැවත උත්සාහ කරන්න.";
            statusDiv.style.color = "#721c24";
            statusDiv.style.backgroundColor = "#f8d7da";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
